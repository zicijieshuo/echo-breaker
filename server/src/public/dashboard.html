<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回声破除者 - 教师管理平台</title>
<style>
  /* ========== 晨雾主题 ========== */
  :root {
    --bg-primary: #f0f7ff;
    --bg-secondary: #ffffff;
    --bg-sidebar: #e8f1fb;
    --text-primary: #1a365d;
    --text-secondary: #4a6fa5;
    --text-muted: #8ba3c7;
    --accent: #4a90d9;
    --accent-hover: #3a7bc8;
    --accent-light: #d6e8f7;
    --border: #c8ddf0;
    --danger: #e53e3e;
    --danger-hover: #c53030;
    --success: #38a169;
    --warning: #d69e2e;
    --shadow: 0 2px 8px rgba(26, 54, 93, 0.08);
    --shadow-lg: 0 4px 16px rgba(26, 54, 93, 0.12);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* ========== 登录页 ========== */
  .login-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #e8f1fb 0%, #d6e8f7 50%, #c8ddf0 100%);
  }

  .login-card {
    background: var(--bg-secondary);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 48px 40px;
    width: 400px;
    max-width: 90vw;
  }

  .login-card h1 {
    text-align: center;
    color: var(--text-primary);
    font-size: 24px;
    margin-bottom: 8px;
  }

  .login-card .subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    color: var(--text-primary);
    background: var(--bg-primary);
    transition: border-color 0.2s;
    outline: none;
  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 20px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    width: 100%;
  }

  .btn-primary:hover { background: var(--accent-hover); }

  .btn-secondary {
    background: var(--accent-light);
    color: var(--accent);
  }

  .btn-secondary:hover { background: #c4ddf2; }

  .btn-danger {
    background: #fed7d7;
    color: var(--danger);
  }

  .btn-danger:hover { background: #feb2b2; }

  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .login-toggle {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .login-toggle a {
    color: var(--accent);
    cursor: pointer;
    text-decoration: none;
  }

  .login-toggle a:hover { text-decoration: underline; }

  .error-msg {
    background: #fff5f5;
    color: var(--danger);
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  /* ========== 主布局 ========== */
  .app-container {
    display: none;
    height: 100vh;
  }

  .app-container.active {
    display: flex;
  }

  .login-container.hidden { display: none; }

  /* 侧边栏 */
  .sidebar {
    width: 260px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h2 {
    font-size: 16px;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .sidebar-header .user-info {
    font-size: 12px;
    color: var(--text-muted);
  }

  .sidebar-section {
    padding: 16px 20px;
    flex: 1;
    overflow-y: auto;
  }

  .sidebar-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .class-item {
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    color: var(--text-secondary);
    transition: all 0.15s;
    margin-bottom: 4px;
  }

  .class-item:hover { background: var(--accent-light); color: var(--accent); }
  .class-item.active { background: var(--accent); color: white; }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }

  .btn-logout {
    width: 100%;
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-muted);
    padding: 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }

  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  /* 主内容区 */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main-header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .main-header h2 {
    font-size: 20px;
    color: var(--text-primary);
  }

  .main-body {
    flex: 1;
    padding: 24px 32px;
    overflow-y: auto;
  }

  /* 空状态 */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; }

  /* 表格 */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--bg-secondary);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .data-table th {
    background: var(--bg-sidebar);
    padding: 12px 16px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .data-table td {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 14px;
    color: var(--text-secondary);
  }

  .data-table tr:hover td { background: var(--bg-primary); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
  }

  .badge-cdi { background: #c6f6d5; color: #276749; }
  .badge-thought { background: #bee3f8; color: #2a4365; }
  .badge-score { background: #fefcbf; color: #744210; }

  /* 学生详情面板 */
  .student-detail {
    display: none;
    position: fixed;
    top: 0;
    right: 0;
    width: 480px;
    height: 100vh;
    background: var(--bg-secondary);
    box-shadow: var(--shadow-lg);
    z-index: 100;
    overflow-y: auto;
  }

  .student-detail.active { display: block; }

  .detail-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg-secondary);
    z-index: 1;
  }

  .detail-header h3 { font-size: 18px; }

  .detail-close {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--text-muted);
    padding: 4px;
  }

  .detail-close:hover { color: var(--text-primary); }

  .detail-body { padding: 24px; }

  .stat-cards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--bg-primary);
    border-radius: var(--radius-sm);
    padding: 16px;
    text-align: center;
  }

  .stat-card .value {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-card .label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .chart-container {
    background: var(--bg-primary);
    border-radius: var(--radius-sm);
    padding: 16px;
    margin-bottom: 24px;
  }

  .chart-container h4 {
    font-size: 14px;
    margin-bottom: 12px;
    color: var(--text-secondary);
  }

  canvas { width: 100%; height: 200px; }

  /* 模态框 */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26, 54, 93, 0.3);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--bg-secondary);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 32px;
    width: 440px;
    max-width: 90vw;
  }

  .modal h3 {
    font-size: 18px;
    margin-bottom: 20px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
  }

  /* 报告区域 */
  .report-section {
    margin-top: 24px;
    padding: 20px;
    background: var(--bg-primary);
    border-radius: var(--radius-sm);
  }

  .report-section h4 {
    font-size: 14px;
    margin-bottom: 12px;
    color: var(--text-secondary);
  }

  .report-section textarea {
    width: 100%;
    min-height: 80px;
    padding: 10px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    resize: vertical;
    font-family: inherit;
    margin-bottom: 12px;
  }

  .report-section textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* 通知 */
  .toast {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    z-index: 999;
    transform: translateX(120%);
    transition: transform 0.3s ease;
  }

  .toast.show { transform: translateX(0); }
  .toast.success { background: #c6f6d5; color: #276749; }
  .toast.error { background: #fed7d7; color: #9b2c2c; }

  /* 响应式 */
  @media (max-width: 768px) {
    .sidebar { width: 200px; }
    .student-detail { width: 100%; }
    .stat-cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- 通知 -->
<div id="toast" class="toast"></div>

<!-- ========== 登录页 ========== -->
<div id="loginPage" class="login-container">
  <div class="login-card">
    <h1>回声破除者</h1>
    <p class="subtitle">教师管理平台</p>
    <div id="loginError" class="error-msg"></div>

    <!-- 登录表单 -->
    <div id="loginForm">
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="loginEmail" placeholder="teacher@example.com">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="输入密码">
      </div>
      <button class="btn btn-primary" onclick="handleLogin()">登录</button>
      <div class="login-toggle">
        还没有账号？<a onclick="toggleAuthForm('register')">注册教师账号</a>
      </div>
    </div>

    <!-- 注册表单 -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>姓名</label>
        <input type="text" id="regName" placeholder="您的姓名">
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="regEmail" placeholder="teacher@example.com">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="regPassword" placeholder="设置密码（至少6位）">
      </div>
      <div class="form-group">
        <label>所属机构</label>
        <input type="text" id="regInstitution" placeholder="学校或机构名称">
      </div>
      <button class="btn btn-primary" onclick="handleRegister()">注册</button>
      <div class="login-toggle">
        已有账号？<a onclick="toggleAuthForm('login')">返回登录</a>
      </div>
    </div>
  </div>
</div>

<!-- ========== 主应用 ========== -->
<div id="appContainer" class="app-container">
  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>回声破除者</h2>
      <div class="user-info" id="userInfo"></div>
    </div>
    <div class="sidebar-section">
      <h3>我的班级</h3>
      <div id="classList"></div>
      <button class="btn btn-secondary btn-sm" style="width:100%;margin-top:12px" onclick="showCreateClassModal()">+ 创建班级</button>
    </div>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="handleLogout()">退出登录</button>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="main-content">
    <div class="main-header">
      <h2 id="mainTitle">选择一个班级</h2>
      <div id="mainActions"></div>
    </div>
    <div class="main-body" id="mainBody">
      <div class="empty-state">
        <div class="icon">📚</div>
        <p>请从左侧选择或创建一个班级</p>
      </div>
    </div>
  </div>

  <!-- 学生详情面板 -->
  <div id="studentDetail" class="student-detail">
    <div class="detail-header">
      <h3 id="detailName">学生详情</h3>
      <button class="detail-close" onclick="closeStudentDetail()">&times;</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<!-- 创建班级模态框 -->
<div id="createClassModal" class="modal-overlay">
  <div class="modal">
    <h3>创建班级</h3>
    <div class="form-group">
      <label>班级名称</label>
      <input type="text" id="newClassName" placeholder="例如：2026春季批判性思维班">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('createClassModal')">取消</button>
      <button class="btn btn-primary" style="width:auto" onclick="handleCreateClass()">创建</button>
    </div>
  </div>
</div>

<!-- 添加学生模态框 -->
<div id="addStudentModal" class="modal-overlay">
  <div class="modal">
    <h3>添加学生</h3>
    <div class="form-group">
      <label>学生ID</label>
      <input type="number" id="addStudentId" placeholder="输入学生的用户ID">
    </div>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">
      学生需要先在扩展中注册账号，此处输入其用户ID即可添加到班级。
    </p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('addStudentModal')">取消</button>
      <button class="btn btn-primary" style="width:auto" onclick="handleAddStudent()">添加</button>
    </div>
  </div>
</div>

<script>
// ========== 全局状态 ==========
const API_BASE = window.location.origin + '/api';
let token = localStorage.getItem('echo_breaker_token');
let currentUser = null;
let currentClassId = null;
let classes = [];

// ========== API 工具 ==========
async function api(path, options = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;

  try {
    const res = await fetch(API_BASE + path, { ...options, headers });
    const data = await res.json();

    if (!res.ok) {
      if (res.status === 401) {
        handleLogout();
      }
      throw new Error(data.error || '请求失败');
    }
    return data;
  } catch (err) {
    if (err.message === 'Failed to fetch') {
      throw new Error('无法连接到服务器');
    }
    throw err;
  }
}

// ========== 通知 ==========
function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast ' + type + ' show';
  setTimeout(() => { toast.className = 'toast ' + type; }, 3000);
}

// ========== 认证 ==========
function toggleAuthForm(form) {
  document.getElementById('loginForm').style.display = form === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = form === 'register' ? 'block' : 'none';
  document.getElementById('loginError').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  if (!email || !password) { showError('请填写邮箱和密码'); return; }

  try {
    const data = await api('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password })
    });
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('echo_breaker_token', token);
    enterApp();
  } catch (err) {
    showError(err.message);
  }
}

async function handleRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const institution = document.getElementById('regInstitution').value.trim();

  if (!name || !email || !password) { showError('请填写所有必填项'); return; }
  if (password.length < 6) { showError('密码至少6位'); return; }

  try {
    const data = await api('/auth/register', {
      method: 'POST',
      body: JSON.stringify({ name, email, password, role: 'teacher', institution })
    });
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('echo_breaker_token', token);
    enterApp();
    showToast('注册成功！');
  } catch (err) {
    showError(err.message);
  }
}

function handleLogout() {
  token = null;
  currentUser = null;
  currentClassId = null;
  localStorage.removeItem('echo_breaker_token');
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('appContainer').classList.remove('active');
}

async function checkAuth() {
  if (!token) return false;
  try {
    const data = await api('/auth/verify', { method: 'POST' });
    currentUser = data.user;
    return true;
  } catch {
    return false;
  }
}

// ========== 主应用 ==========
async function enterApp() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('appContainer').classList.add('active');
  document.getElementById('userInfo').textContent = currentUser.name + ' · ' + (currentUser.institution || '教师');
  await loadClasses();
}

async function loadClasses() {
  try {
    classes = await api('/teacher/classes');
    renderClassList();
  } catch (err) {
    showToast('加载班级失败: ' + err.message, 'error');
  }
}

function renderClassList() {
  const container = document.getElementById('classList');
  if (classes.length === 0) {
    container.innerHTML = '<p style="font-size:13px;color:var(--text-muted)">暂无班级</p>';
    return;
  }
  container.innerHTML = classes.map(c =>
    `<div class="class-item ${c.id === currentClassId ? 'active' : ''}" onclick="selectClass(${c.id})">${c.name}</div>`
  ).join('');
}

async function selectClass(classId) {
  currentClassId = classId;
  const cls = classes.find(c => c.id === classId);
  document.getElementById('mainTitle').textContent = cls ? cls.name : '班级详情';
  document.getElementById('mainActions').innerHTML =
    '<button class="btn btn-secondary btn-sm" onclick="showAddStudentModal()">+ 添加学生</button> ' +
    '<button class="btn btn-secondary btn-sm" onclick="loadClassReport()">查看报告</button>';
  renderClassList();
  await loadStudents();
}

async function loadStudents() {
  if (!currentClassId) return;
  try {
    const students = await api('/teacher/classes/' + currentClassId + '/students');
    renderStudentTable(students);
  } catch (err) {
    showToast('加载学生列表失败: ' + err.message, 'error');
  }
}

function renderStudentTable(students) {
  const body = document.getElementById('mainBody');

  if (students.length === 0) {
    body.innerHTML = `
      <div class="empty-state">
        <div class="icon">👥</div>
        <p>班级暂无学生，点击"添加学生"开始</p>
      </div>`;
    return;
  }

  body.innerHTML = `
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>姓名</th>
          <th>邮箱</th>
          <th>加入时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        ${students.map(s => `
          <tr>
            <td>${s.id}</td>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${formatDate(s.joined_at)}</td>
            <td>
              <button class="btn btn-secondary btn-sm" onclick="showStudentDetail(${s.id}, '${s.name}')">详情</button>
              <button class="btn btn-danger btn-sm" onclick="removeStudent(${s.id})">移除</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

// ========== 学生详情 ==========
async function showStudentDetail(studentId, studentName) {
  document.getElementById('detailName').textContent = studentName;
  document.getElementById('studentDetail').classList.add('active');

  const detailBody = document.getElementById('detailBody');
  detailBody.innerHTML = '<p style="color:var(--text-muted)">加载中...</p>';

  try {
    const [cdiRecords, thoughtLogs, targetScores] = await Promise.all([
      api('/sync/cdi/' + studentId),
      api('/sync/thought-logs/' + studentId),
      api('/sync/target-scores/' + studentId)
    ]);

    const avgCdi = cdiRecords.length > 0
      ? (cdiRecords.reduce((s, r) => s + r.cdi, 0) / cdiRecords.length).toFixed(2)
      : '—';
    const avgBias = thoughtLogs.length > 0
      ? (thoughtLogs.reduce((s, l) => s + l.bias_score, 0) / thoughtLogs.length).toFixed(2)
      : '—';
    const avgScore = targetScores.length > 0
      ? (targetScores.reduce((s, t) => s + t.score, 0) / targetScores.length).toFixed(2)
      : '—';

    detailBody.innerHTML = `
      <div class="stat-cards">
        <div class="stat-card">
          <div class="value">${cdiRecords.length}</div>
          <div class="label">CDI 记录数</div>
        </div>
        <div class="stat-card">
          <div class="value">${thoughtLogs.length}</div>
          <div class="label">思维日志数</div>
        </div>
        <div class="stat-card">
          <div class="value">${targetScores.length}</div>
          <div class="label">目标分数数</div>
        </div>
      </div>

      <div class="stat-cards">
        <div class="stat-card">
          <div class="value">${avgCdi}</div>
          <div class="label">平均 CDI</div>
        </div>
        <div class="stat-card">
          <div class="value">${avgBias}</div>
          <div class="label">平均偏差分数</div>
        </div>
        <div class="stat-card">
          <div class="value">${avgScore}</div>
          <div class="label">平均目标分数</div>
        </div>
      </div>

      <div class="chart-container">
        <h4>CDI 趋势</h4>
        <canvas id="cdiChart" width="400" height="200"></canvas>
      </div>

      ${thoughtLogs.length > 0 ? `
      <div class="chart-container">
        <h4>近期思维日志</h4>
        ${thoughtLogs.slice(0, 5).map(l => `
          <div style="padding:8px 0;border-bottom:1px solid var(--border)">
            <div style="font-size:13px;color:var(--text-primary)">${escapeHtml(l.question)}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:2px">
              偏差分数: ${l.bias_score} · ${formatDate(l.created_at)}
            </div>
          </div>
        `).join('')}
      </div>
      ` : ''}

      <div class="report-section">
        <h4>生成教师报告</h4>
        <textarea id="teacherComment" placeholder="输入对该学生的评语和建议..."></textarea>
        <button class="btn btn-primary btn-sm" onclick="saveReport(${studentId})">保存报告</button>
      </div>
    `;

    // 绘制 CDI 趋势图
    if (cdiRecords.length > 0) {
      drawCdiChart(cdiRecords.reverse());
    }
  } catch (err) {
    detailBody.innerHTML = `<p style="color:var(--danger)">加载失败: ${err.message}</p>`;
  }
}

function closeStudentDetail() {
  document.getElementById('studentDetail').classList.remove('active');
}

// ========== CDI 趋势图 ==========
function drawCdiChart(records) {
  const canvas = document.getElementById('cdiChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = 200 * dpr;
  ctx.scale(dpr, dpr);

  const w = canvas.offsetWidth;
  const h = 200;
  const padding = { top: 20, right: 20, bottom: 40, left: 50 };
  const chartW = w - padding.left - padding.right;
  const chartH = h - padding.top - padding.bottom;

  if (records.length === 0) return;

  const cdiValues = records.map(r => r.cdi);
  const maxVal = Math.max(...cdiValues, 1);
  const minVal = Math.min(...cdiValues, 0);
  const range = maxVal - minVal || 1;

  // 背景
  ctx.fillStyle = '#f0f7ff';
  ctx.fillRect(0, 0, w, h);

  // 网格线
  ctx.strokeStyle = '#c8ddf0';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = padding.top + (chartH / 4) * i;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(w - padding.right, y);
    ctx.stroke();

    // Y轴标签
    const val = maxVal - (range / 4) * i;
    ctx.fillStyle = '#8ba3c7';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(1), padding.left - 8, y + 4);
  }

  // 数据线
  ctx.strokeStyle = '#4a90d9';
  ctx.lineWidth = 2;
  ctx.beginPath();

  const points = records.map((r, i) => ({
    x: padding.left + (chartW / Math.max(records.length - 1, 1)) * i,
    y: padding.top + chartH - ((r.cdi - minVal) / range) * chartH
  }));

  points.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  });
  ctx.stroke();

  // 数据点
  points.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#4a90d9';
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // X轴标签
  ctx.fillStyle = '#8ba3c7';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  const maxLabels = 8;
  const step = Math.max(1, Math.floor(records.length / maxLabels));
  records.forEach((r, i) => {
    if (i % step === 0 || i === records.length - 1) {
      const x = padding.left + (chartW / Math.max(records.length - 1, 1)) * i;
      ctx.fillText(r.date.substring(5), x, h - padding.bottom + 16);
    }
  });
}

// ========== 班级操作 ==========
function showCreateClassModal() {
  document.getElementById('newClassName').value = '';
  document.getElementById('createClassModal').classList.add('active');
}

function showAddStudentModal() {
  document.getElementById('addStudentId').value = '';
  document.getElementById('addStudentModal').classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

async function handleCreateClass() {
  const name = document.getElementById('newClassName').value.trim();
  if (!name) { showToast('请输入班级名称', 'error'); return; }

  try {
    await api('/teacher/classes', {
      method: 'POST',
      body: JSON.stringify({ name })
    });
    closeModal('createClassModal');
    showToast('班级创建成功');
    await loadClasses();
  } catch (err) {
    showToast('创建失败: ' + err.message, 'error');
  }
}

async function handleAddStudent() {
  const student_id = parseInt(document.getElementById('addStudentId').value, 10);
  if (!student_id) { showToast('请输入有效的学生ID', 'error'); return; }

  try {
    await api('/teacher/classes/' + currentClassId + '/students', {
      method: 'POST',
      body: JSON.stringify({ student_id })
    });
    closeModal('addStudentModal');
    showToast('学生已添加');
    await loadStudents();
  } catch (err) {
    showToast('添加失败: ' + err.message, 'error');
  }
}

async function removeStudent(studentId) {
  if (!confirm('确定要移除该学生吗？')) return;

  try {
    await api('/teacher/classes/' + currentClassId + '/students/' + studentId, {
      method: 'DELETE'
    });
    showToast('学生已移除');
    await loadStudents();
  } catch (err) {
    showToast('移除失败: ' + err.message, 'error');
  }
}

async function loadClassReport() {
  if (!currentClassId) return;
  try {
    const report = await api('/teacher/classes/' + currentClassId + '/report');
    renderClassReport(report);
  } catch (err) {
    showToast('加载报告失败: ' + err.message, 'error');
  }
}

function renderClassReport(report) {
  const body = document.getElementById('mainBody');

  body.innerHTML = `
    <h3 style="margin-bottom:16px">${report.class.name} - 班级报告</h3>
    <p style="color:var(--text-muted);margin-bottom:20px">共 ${report.student_count} 名学生</p>

    ${report.report.length === 0 ? '<p style="color:var(--text-muted)">暂无学生数据</p>' : ''}

    ${report.report.map(r => `
      <div style="background:var(--bg-secondary);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <strong>${r.student.name}</strong>
          <span style="font-size:12px;color:var(--text-muted)">${r.student.email}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:13px">
          <div><span class="badge badge-cdi">CDI</span> ${r.summary.cdi_count}条 · 均值 ${r.summary.avg_cdi}</div>
          <div><span class="badge badge-thought">思维</span> ${r.summary.thought_log_count}条 · 偏差 ${r.summary.avg_bias_score}</div>
          <div><span class="badge badge-score">目标</span> ${r.summary.target_score_count}条 · 均分 ${r.summary.avg_target_score}</div>
        </div>
      </div>
    `).join('')}

    <button class="btn btn-secondary" style="margin-top:16px" onclick="selectClass(${currentClassId})">返回学生列表</button>
  `;
}

async function saveReport(studentId) {
  const comment = document.getElementById('teacherComment').value.trim();
  const period = new Date().toISOString().substring(0, 7); // YYYY-MM

  try {
    await api('/teacher/reports', {
      method: 'POST',
      body: JSON.stringify({
        student_id: studentId,
        class_id: currentClassId,
        period,
        report_data: { generated_at: new Date().toISOString() },
        teacher_comment: comment
      })
    });
    showToast('报告已保存');
  } catch (err) {
    showToast('保存失败: ' + err.message, 'error');
  }
}

// ========== 工具函数 ==========
function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'Z');
  return d.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ========== 初始化 ==========
async function init() {
  const isAuth = await checkAuth();
  if (isAuth) {
    enterApp();
  }
}

init();
</script>
