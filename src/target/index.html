<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>回声破除者 - AI结论靶场</title>
  <style>
    input:focus, select:focus, textarea:focus {
      border-color: #5b9bd5 !important;
    }
    #btn-back-to-grid:hover {
      background: #e8f0fa !important;
    }
    #btn-submit-find-fault:hover {
      background: rgba(232,114,154,0.15) !important;
    }
    #btn-retry-find-fault:hover,
    #btn-toggle-connect-mode:hover {
      background: rgba(91,155,213,0.12) !important;
    }
    #btn-save-evidence-map:hover {
      background: rgba(76,175,125,0.12) !important;
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f0f5fa; color: #2c3e50; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; min-height: 100vh;">

  <div style="max-width: 960px; margin: 0 auto; padding: 32px 24px;">

    <!-- ==================== 页面标题 ==================== -->
    <header style="margin-bottom: 32px; border-bottom: 1px solid #dce6f0; padding-bottom: 16px;">
      <h1 style="font-size: 28px; font-weight: bold; color: #5b9bd5; margin: 0 0 4px 0;">🎯 AI结论靶场</h1>
      <p style="font-size: 14px; color: #7f8c9b; margin: 0;">训练你的批判性思维 - 找出AI回答中的薄弱依据</p>
    </header>

    <!-- ==================== 1. 靶子选择区 ==================== -->
    <section id="section-target-select" style="margin-bottom: 36px;">
      <h2 style="font-size: 18px; font-weight: 600; color: #e8a838; margin: 0 0 16px 0; display: flex; align-items: center; gap: 8px;">
        <span style="width: 4px; height: 20px; background: #e8a838; border-radius: 2px; display: inline-block;"></span>
        选择靶子
      </h2>
      <div id="target-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px;">
        <!-- 动态填充靶子卡片 -->
      </div>
    </section>

    <!-- ==================== 2. 靶子内容与找茬任务 ==================== -->
    <section id="section-target-content" style="margin-bottom: 36px; display: none;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
        <h2 style="font-size: 18px; font-weight: 600; color: #5b9bd5; margin: 0; display: flex; align-items: center; gap: 8px;">
          <span style="width: 4px; height: 20px; background: #5b9bd5; border-radius: 2px; display: inline-block;"></span>
          <span id="target-title-display">靶子内容</span>
        </h2>
        <button id="btn-back-to-grid" style="background: #ffffff; color: #7f8c9b; border: 1px solid #dce6f0; border-radius: 8px; padding: 6px 16px; font-size: 13px; cursor: pointer; transition: background 0.2s;">← 返回列表</button>
      </div>

      <!-- 靶子信息标签 -->
      <div id="target-meta" style="display: flex; gap: 8px; margin-bottom: 16px;">
        <span id="target-category-badge" style="font-size: 12px; padding: 3px 10px; border-radius: 12px; background: rgba(91,155,213,0.12); color: #5b9bd5;"></span>
        <span id="target-difficulty-badge" style="font-size: 12px; padding: 3px 10px; border-radius: 12px;"></span>
      </div>

      <!-- 找茬说明 -->
      <div style="background: rgba(232,168,56,0.08); border: 1px solid rgba(232,168,56,0.2); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px;">
        <p style="margin: 0; font-size: 13px; color: #e8a838;">💡 高亮你认为存在薄弱依据的文本段落。点击句子即可高亮，再次点击取消高亮。</p>
      </div>

      <!-- 靶子文本内容 -->
      <div id="target-content-display" style="background: #ffffff; border-radius: 12px; padding: 20px; margin-bottom: 20px; line-height: 1.8; font-size: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);">
        <!-- 动态填充句子 -->
      </div>

      <!-- 提交按钮 -->
      <div id="find-fault-actions" style="display: flex; gap: 12px; align-items: center;">
        <button id="btn-submit-find-fault" style="background: rgba(232,114,154,0.12); color: #e8729a; border: 1px solid rgba(232,114,154,0.3); border-radius: 10px; padding: 10px 28px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s;">提交找茬</button>
        <span id="highlight-count" style="font-size: 13px; color: #7f8c9b;">已高亮 0 处</span>
      </div>
    </section>

    <!-- ==================== 3. 找茬结果 ==================== -->
    <section id="section-find-fault-result" style="margin-bottom: 36px; display: none;">
      <h2 style="font-size: 18px; font-weight: 600; color: #e8729a; margin: 0 0 16px 0; display: flex; align-items: center; gap: 8px;">
        <span style="width: 4px; height: 20px; background: #e8729a; border-radius: 2px; display: inline-block;"></span>
        找茬结果
      </h2>

      <!-- 得分 -->
      <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
        <div style="text-align: center;">
          <div id="result-score" style="font-size: 48px; font-weight: bold; color: #e8a838; line-height: 1;">0</div>
          <div style="font-size: 12px; color: #7f8c9b; margin-top: 4px;">匹配得分</div>
        </div>
        <div style="flex: 1;">
          <div id="result-feedback" style="font-size: 14px; color: #2c3e50; line-height: 1.6;"></div>
        </div>
      </div>

      <!-- 结果详情 -->
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px;">
        <div style="background: rgba(76,175,125,0.08); border: 1px solid rgba(76,175,125,0.2); border-radius: 10px; padding: 14px;">
          <div style="font-size: 12px; color: #4caf7d; margin-bottom: 8px; font-weight: 600;">✓ 正确识别</div>
          <div id="result-matched" style="font-size: 13px; color: #2c3e50; line-height: 1.6;"></div>
        </div>
        <div style="background: rgba(224,85,85,0.08); border: 1px solid rgba(224,85,85,0.2); border-radius: 10px; padding: 14px;">
          <div style="font-size: 12px; color: #e05555; margin-bottom: 8px; font-weight: 600;">✗ 遗漏的薄弱点</div>
          <div id="result-missed" style="font-size: 13px; color: #2c3e50; line-height: 1.6;"></div>
        </div>
        <div style="background: rgba(127,140,155,0.08); border: 1px solid rgba(127,140,155,0.2); border-radius: 10px; padding: 14px;">
          <div style="font-size: 12px; color: #7f8c9b; margin-bottom: 8px; font-weight: 600;">? 误判标注</div>
          <div id="result-false-alarms" style="font-size: 13px; color: #2c3e50; line-height: 1.6;"></div>
        </div>
      </div>

      <!-- 结果中的文本高亮展示 -->
      <div id="result-content-display" style="background: #ffffff; border-radius: 12px; padding: 20px; margin-bottom: 20px; line-height: 1.8; font-size: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);">
        <!-- 动态填充带颜色的句子 -->
      </div>

      <button id="btn-retry-find-fault" style="background: rgba(91,155,213,0.1); color: #5b9bd5; border: 1px solid rgba(91,155,213,0.3); border-radius: 8px; padding: 8px 20px; font-size: 13px; cursor: pointer; transition: background 0.2s;">重新挑战</button>
    </section>

    <!-- ==================== 4. 证据链导图 ==================== -->
    <section id="section-evidence-map" style="margin-bottom: 36px; display: none;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
        <h2 style="font-size: 18px; font-weight: 600; color: #e8a838; margin: 0; display: flex; align-items: center; gap: 8px;">
          <span style="width: 4px; height: 20px; background: #e8a838; border-radius: 2px; display: inline-block;"></span>
          证据链导图
        </h2>
        <div style="display: flex; gap: 8px;">
          <button id="btn-toggle-connect-mode" style="background: rgba(91,155,213,0.1); color: #5b9bd5; border: 1px solid rgba(91,155,213,0.3); border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: background 0.2s;">🔗 连线模式</button>
          <button id="btn-save-evidence-map" style="background: rgba(76,175,125,0.1); color: #4caf7d; border: 1px solid rgba(76,175,125,0.3); border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: background 0.2s;">💾 保存导图</button>
        </div>
      </div>

      <!-- 图例 -->
      <div style="display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: #7f8c9b;">
        <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 12px; height: 12px; border-radius: 3px; background: #5b9bd5; display: inline-block;"></span> 证据</span>
        <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 12px; height: 12px; border-radius: 3px; background: #e8a838; display: inline-block;"></span> 推论</span>
        <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 12px; height: 12px; border-radius: 3px; background: #4caf7d; display: inline-block;"></span> 结论</span>
        <span id="connect-mode-hint" style="display: none; color: #5b9bd5; font-weight: 600;">🔗 连线模式已开启 - 依次点击两个节点创建连线</span>
      </div>

      <!-- Canvas 画布 -->
      <div style="background: #ffffff; border: 1px solid #dce6f0; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06);">
        <canvas id="evidence-map-canvas" width="900" height="500" style="display: block; width: 100%; cursor: grab;"></canvas>
      </div>
    </section>

    <!-- 底部 -->
    <footer style="text-align: center; padding: 16px 0; border-top: 1px solid #dce6f0;">
      <p style="font-size: 12px; color: #7f8c9b; margin: 0;">回声破除者 · L4 逆向重构层 · AI结论靶场</p>
    </footer>

  </div>

  <script src="target.js"></script>
</body>
</html>
