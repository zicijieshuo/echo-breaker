<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>回声破除者 - AI结论靶场</title>
</head>
<body style="margin: 0; padding: 0; background-color: #1e1b4b; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; min-height: 100vh;">

  <div style="max-width: 960px; margin: 0 auto; padding: 32px 24px;">

    <!-- ==================== 页面标题 ==================== -->
    <header style="margin-bottom: 32px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 16px;">
      <h1 style="font-size: 28px; font-weight: bold; color: #818cf8; margin: 0 0 4px 0;">🎯 AI结论靶场</h1>
      <p style="font-size: 14px; color: #9ca3af; margin: 0;">训练你的批判性思维 - 找出AI回答中的薄弱依据</p>
    </header>

    <!-- ==================== 1. 靶子选择区 ==================== -->
    <section id="section-target-select" style="margin-bottom: 36px;">
      <h2 style="font-size: 18px; font-weight: 600; color: #f59e0b; margin: 0 0 16px 0; display: flex; align-items: center; gap: 8px;">
        <span style="width: 4px; height: 20px; background: #f59e0b; border-radius: 2px; display: inline-block;"></span>
        选择靶子
      </h2>
      <div id="target-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px;">
        <!-- 动态填充靶子卡片 -->
      </div>
    </section>

    <!-- ==================== 2. 靶子内容与找茬任务 ==================== -->
    <section id="section-target-content" style="margin-bottom: 36px; display: none;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
        <h2 style="font-size: 18px; font-weight: 600; color: #818cf8; margin: 0; display: flex; align-items: center; gap: 8px;">
          <span style="width: 4px; height: 20px; background: #818cf8; border-radius: 2px; display: inline-block;"></span>
          <span id="target-title-display">靶子内容</span>
        </h2>
        <button id="btn-back-to-grid" style="background: rgba(255,255,255,0.08); color: #9ca3af; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 6px 16px; font-size: 13px; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">← 返回列表</button>
      </div>

      <!-- 靶子信息标签 -->
      <div id="target-meta" style="display: flex; gap: 8px; margin-bottom: 16px;">
        <span id="target-category-badge" style="font-size: 12px; padding: 3px 10px; border-radius: 12px; background: rgba(129,140,248,0.15); color: #818cf8;"></span>
        <span id="target-difficulty-badge" style="font-size: 12px; padding: 3px 10px; border-radius: 12px;"></span>
      </div>

      <!-- 找茬说明 -->
      <div style="background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px;">
        <p style="margin: 0; font-size: 13px; color: #f59e0b;">💡 高亮你认为存在薄弱依据的文本段落。点击句子即可高亮，再次点击取消高亮。</p>
      </div>

      <!-- 靶子文本内容 -->
      <div id="target-content-display" style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; margin-bottom: 20px; line-height: 1.8; font-size: 15px;">
        <!-- 动态填充句子 -->
      </div>

      <!-- 提交按钮 -->
      <div id="find-fault-actions" style="display: flex; gap: 12px; align-items: center;">
        <button id="btn-submit-find-fault" style="background: rgba(244,114,182,0.2); color: #f472b6; border: 1px solid rgba(244,114,182,0.4); border-radius: 10px; padding: 10px 28px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='rgba(244,114,182,0.35)'" onmouseout="this.style.background='rgba(244,114,182,0.2)'">提交找茬</button>
        <span id="highlight-count" style="font-size: 13px; color: #9ca3af;">已高亮 0 处</span>
      </div>
    </section>

    <!-- ==================== 3. 找茬结果 ==================== -->
    <section id="section-find-fault-result" style="margin-bottom: 36px; display: none;">
      <h2 style="font-size: 18px; font-weight: 600; color: #f472b6; margin: 0 0 16px 0; display: flex; align-items: center; gap: 8px;">
        <span style="width: 4px; height: 20px; background: #f472b6; border-radius: 2px; display: inline-block;"></span>
        找茬结果
      </h2>

      <!-- 得分 -->
      <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
        <div style="text-align: center;">
          <div id="result-score" style="font-size: 48px; font-weight: bold; color: #f59e0b; line-height: 1;">0</div>
          <div style="font-size: 12px; color: #9ca3af; margin-top: 4px;">匹配得分</div>
        </div>
        <div style="flex: 1;">
          <div id="result-feedback" style="font-size: 14px; color: #e2e8f0; line-height: 1.6;"></div>
        </div>
      </div>

      <!-- 结果详情 -->
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px;">
        <div style="background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); border-radius: 10px; padding: 14px;">
          <div style="font-size: 12px; color: #4ade80; margin-bottom: 8px; font-weight: 600;">✓ 正确识别</div>
          <div id="result-matched" style="font-size: 13px; color: #d1d5db; line-height: 1.6;"></div>
        </div>
        <div style="background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; padding: 14px;">
          <div style="font-size: 12px; color: #ef4444; margin-bottom: 8px; font-weight: 600;">✗ 遗漏的薄弱点</div>
          <div id="result-missed" style="font-size: 13px; color: #d1d5db; line-height: 1.6;"></div>
        </div>
        <div style="background: rgba(156,163,175,0.08); border: 1px solid rgba(156,163,175,0.2); border-radius: 10px; padding: 14px;">
          <div style="font-size: 12px; color: #9ca3af; margin-bottom: 8px; font-weight: 600;">? 误判标注</div>
          <div id="result-false-alarms" style="font-size: 13px; color: #d1d5db; line-height: 1.6;"></div>
        </div>
      </div>

      <!-- 结果中的文本高亮展示 -->
      <div id="result-content-display" style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; margin-bottom: 20px; line-height: 1.8; font-size: 15px;">
        <!-- 动态填充带颜色的句子 -->
      </div>

      <button id="btn-retry-find-fault" style="background: rgba(129,140,248,0.15); color: #818cf8; border: 1px solid rgba(129,140,248,0.3); border-radius: 8px; padding: 8px 20px; font-size: 13px; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='rgba(129,140,248,0.25)'" onmouseout="this.style.background='rgba(129,140,248,0.15)'">重新挑战</button>
    </section>

    <!-- ==================== 4. 证据链导图 ==================== -->
    <section id="section-evidence-map" style="margin-bottom: 36px; display: none;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
        <h2 style="font-size: 18px; font-weight: 600; color: #f59e0b; margin: 0; display: flex; align-items: center; gap: 8px;">
          <span style="width: 4px; height: 20px; background: #f59e0b; border-radius: 2px; display: inline-block;"></span>
          证据链导图
        </h2>
        <div style="display: flex; gap: 8px;">
          <button id="btn-toggle-connect-mode" style="background: rgba(129,140,248,0.15); color: #818cf8; border: 1px solid rgba(129,140,248,0.3); border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='rgba(129,140,248,0.25)'" onmouseout="this.style.background='rgba(129,140,248,0.15)'">🔗 连线模式</button>
          <button id="btn-save-evidence-map" style="background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='rgba(74,222,128,0.25)'" onmouseout="this.style.background='rgba(74,222,128,0.15)'">💾 保存导图</button>
        </div>
      </div>

      <!-- 图例 -->
      <div style="display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: #9ca3af;">
        <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 12px; height: 12px; border-radius: 3px; background: #3b82f6; display: inline-block;"></span> 证据</span>
        <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 12px; height: 12px; border-radius: 3px; background: #f59e0b; display: inline-block;"></span> 推论</span>
        <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 12px; height: 12px; border-radius: 3px; background: #4ade80; display: inline-block;"></span> 结论</span>
        <span id="connect-mode-hint" style="display: none; color: #818cf8; font-weight: 600;">🔗 连线模式已开启 - 依次点击两个节点创建连线</span>
      </div>

      <!-- Canvas 画布 -->
      <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden;">
        <canvas id="evidence-map-canvas" width="900" height="500" style="display: block; width: 100%; cursor: grab;"></canvas>
      </div>
    </section>

    <!-- 底部 -->
    <footer style="text-align: center; padding: 16px 0; border-top: 1px solid rgba(255,255,255,0.06);">
      <p style="font-size: 12px; color: #6b7280; margin: 0;">回声破除者 · L4 逆向重构层 · AI结论靶场</p>
    </footer>

  </div>

  <script src="target.js"></script>
</body>
</html>
