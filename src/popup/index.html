<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>回声破除者</title>
</head>
<body style="width: 420px; min-height: 560px; background-color: #1e1b4b; color: white; padding: 20px; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;">
  <!-- 头部：标题 + 当前状态 -->
  <header style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
    <div>
      <h1 style="font-size: 20px; font-weight: bold; color: #818cf8; margin: 0;">🧠 回声破除者</h1>
      <p style="font-size: 12px; color: #9ca3af; margin-top: 2px;">认知抗阻伴学插件</p>
    </div>
    <div id="status-indicator" style="display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05); border-radius: 9999px; padding: 4px 12px;">
      <span id="status-dot" style="width: 8px; height: 8px; border-radius: 50%; background: #6b7280;"></span>
      <span id="status-text" style="font-size: 12px; color: #9ca3af;">未监测</span>
    </div>
  </header>

  <!-- 今日概览 -->
  <section style="margin-bottom: 16px;">
    <h2 style="font-size: 14px; font-weight: 600; color: #f59e0b; margin-bottom: 8px;">今日概览</h2>
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
      <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; text-align: center;">
        <div id="today-duration" style="font-size: 18px; font-weight: bold; color: #818cf8;">00:00</div>
        <div style="font-size: 12px; color: #9ca3af;">使用时长</div>
      </div>
      <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; text-align: center;">
        <div id="today-rounds" style="font-size: 18px; font-weight: bold; color: #f59e0b;">0</div>
        <div style="font-size: 12px; color: #9ca3af;">连续提问</div>
      </div>
      <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; text-align: center;">
        <div id="today-copies" style="font-size: 18px; font-weight: bold; color: #f472b6;">0</div>
        <div style="font-size: 12px; color: #9ca3af;">复制次数</div>
      </div>
    </div>
  </section>

  <!-- 本周趋势图 -->
  <section style="margin-bottom: 16px;">
    <h2 style="font-size: 14px; font-weight: 600; color: #f59e0b; margin-bottom: 8px;">本周趋势</h2>
    <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 8px;">
      <div id="weekly-chart" style="width: 100%; height: 180px;"></div>
    </div>
  </section>

  <!-- 提问 vs 复制比例图 -->
  <section style="margin-bottom: 16px;">
    <h2 style="font-size: 14px; font-weight: 600; color: #f59e0b; margin-bottom: 8px;">提问 vs 复制</h2>
    <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 8px;">
      <div id="ratio-chart" style="width: 100%; height: 150px;"></div>
    </div>
  </section>

  <!-- 高频使用时段 -->
  <section style="margin-bottom: 16px;">
    <h2 style="font-size: 14px; font-weight: 600; color: #f59e0b; margin-bottom: 8px;">高频使用时段</h2>
    <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 8px;">
      <div id="hourly-chart" style="width: 100%; height: 150px;"></div>
    </div>
  </section>

  <!-- 功能入口 -->
  <section style="margin-bottom: 16px;">
    <h2 style="font-size: 14px; font-weight: 600; color: #f59e0b; margin-bottom: 8px;">训练工具</h2>
    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;">
      <button id="guided-mode-btn" style="background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); border-radius: 12px; padding: 12px 8px; cursor: pointer; text-align: center; color: white; font-size: 12px;">
        <div style="font-size: 20px; margin-bottom: 4px;">🧠</div>
        <div style="color: #a5b4fc;">引导模式</div>
        <div style="font-size: 10px; color: #6b7280; margin-top: 2px;">L2 延迟满足</div>
      </button>
      <button id="thought-log-btn" style="background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); border-radius: 12px; padding: 12px 8px; cursor: pointer; text-align: center; color: white; font-size: 12px;">
        <div style="font-size: 20px; margin-bottom: 4px;">📝</div>
        <div style="color: #fbbf24;">思考日志</div>
        <div style="font-size: 10px; color: #6b7280; margin-top: 2px;">L3 元认知</div>
      </button>
      <button id="target-range-btn" style="background: rgba(244,114,182,0.15); border: 1px solid rgba(244,114,182,0.3); border-radius: 12px; padding: 12px 8px; cursor: pointer; text-align: center; color: white; font-size: 12px;">
        <div style="font-size: 20px; margin-bottom: 4px;">🎯</div>
        <div style="color: #f472b6;">AI靶场</div>
        <div style="font-size: 10px; color: #6b7280; margin-top: 2px;">L4 逆向重构</div>
      </button>
      <button id="api-count-btn" style="background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.3); border-radius: 12px; padding: 12px 8px; cursor: pointer; text-align: center; color: white; font-size: 12px;">
        <div style="font-size: 20px; margin-bottom: 4px;">📊</div>
        <div id="api-count-display" style="color: #4ade80;">API: 0/50</div>
        <div style="font-size: 10px; color: #6b7280; margin-top: 2px;">今日调用</div>
      </button>
    </div>
  </section>

  <!-- 底部操作栏 -->
  <footer style="display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #6b7280; margin-top: 8px;">
    <span id="version-text">v0.4.2</span>
    <div style="display: flex; align-items: center; gap: 12px;">
      <button id="refresh-btn" style="color: #4ade80; text-decoration: none; background: none; border: none; cursor: pointer; font-size: 12px;">🔄 刷新</button>
      <button id="export-btn" style="color: #818cf8; text-decoration: none; background: none; border: none; cursor: pointer; font-size: 12px;">导出日志</button>
      <button id="clear-btn" style="color: rgba(244,114,182,0.7); text-decoration: none; background: none; border: none; cursor: pointer; font-size: 12px;">清除数据</button>
      <button id="settings-btn" style="color: #818cf8; text-decoration: none; background: none; border: none; cursor: pointer; font-size: 12px;">设置</button>
    </div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
